name: 🤖 FunsDiia Bot

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # Запуск кожні 5 годин
    - cron: '0 */5 * * *'

# Якщо запускається новий процес — старий зупиняється
concurrency:
  group: bot-worker
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔄 Restore data files
        uses: actions/cache@v4
        with:
          path: |
            users_data.json
            orders_data.json
            feedback_data.json
            tariffs_data.json
            promo_data.json
            action_logs.json
            banned_users.json
            bot_settings.json
            order_photos/
          key: bot-data-${{ github.run_id }}
          restore-keys: |
            bot-data-

      - name: 🚀 Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          GROUP_CHAT_ID: ${{ secrets.GROUP_CHAT_ID }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          # GitHub Personal Access Token для деплою GitHub Pages
          PAGES_GH_TOKEN: ${{ secrets.PAGES_GH_TOKEN }}
          # DeepSeek API ключ для AI-автоматизації
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          REFERRAL_REWARD: ${{ secrets.REFERRAL_REWARD }}
          MIN_WITHDRAW: ${{ secrets.MIN_WITHDRAW }}
          GITHUB_ACTIONS: "true"
          LOG_LEVEL: INFO
          SQLITECLOUD_URL: ${{ secrets.SQLITECLOUD_URL }} # <--- ДОДАЙТЕ Ц
          GH_TOKEN_2: ${{ secrets.GH_TOKEN_2 }}
        # Зупиняємо через 295 хв, щоб встигнути зберегти кеш
        run: timeout 295m python bot.py || true

      - name: 💾 Save data files
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            users_data.json
            orders_data.json
            feedback_data.json
            tariffs_data.json
            promo_data.json
            action_logs.json
            banned_users.json
            bot_settings.json
            order_photos/
          key: bot-data-${{ github.run_id }}

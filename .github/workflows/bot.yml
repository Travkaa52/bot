name: 🤖 FunsDiia Bot

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # Запуск каждые 5 часов (300 минут)
    - cron: '0 */5 * * *'

# Контроль параллельности: если запускается новый процесс, старый будет отменен (потушен)
concurrency:
  group: bot-worker
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔄 Restore data files
        uses: actions/cache@v4
        with:
          path: |
            users_data.json
            orders_data.json
            feedback_data.json
            tariffs_data.json
            promo_data.json
            action_logs.json
            banned_users.json
            bot_settings.json
          key: bot-data-${{ github.run_id }}
          restore-keys: |
            bot-data-

      - name: 🚀 Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          GITHUB_ACTIONS: "true"
          LOG_LEVEL: INFO
        # Ограничиваем время работы скрипта 295 минутами (чуть меньше 5 часов).
        # Скрипт завершится сам, чтобы успеть сохранить кэш до того, как его убьет новый процесс.
        run: timeout 295m python bot.py || true

      - name: 💾 Save data files
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            users_data.json
            orders_data.json
            feedback_data.json
            tariffs_data.json
            promo_data.json
            action_logs.json
            banned_users.json
            bot_settings.json
          key: bot-data-${{ github.run_id }}
